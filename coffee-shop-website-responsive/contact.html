<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Brew & Bean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Brew &amp; Bean</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-main">
        <h1>Contact Us</h1>

        <div class="contact-layout">
            <aside class="contact-info">
                <h2>Find Us</h2>
                <address>
                    <ul>
                        <li>📞 <a href="tel:+15550123456">(555) 012-3456</a></li>
                        <li>📍 42 Roast Lane, Portland, OR 97201</li>
                        <li>🕐 Mon–Fri 7am–7pm</li>
                        <li>🕐 Sat–Sun 8am–6pm</li>
                    </ul>
                </address>
                <figure>
                    <img
                        src="https://images.pexels.com/photos/683039/pexels-photo-683039.jpeg"
                        alt="Cosy coffee shop interior with wooden tables — Photo by Pixabay on Pexels"
                    >
                </figure>
            </aside>

            <section class="contact-form">
                <h2>Send a Message</h2>
                <form>
                    <div>
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name">
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com">
                    </div>
                    <div>
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>© 2024 Brew &amp; Bean · 42 Roast Lane, Portland · <a href="contact.html">Contact us</a></p>
    </footer>
</body>
</html>
