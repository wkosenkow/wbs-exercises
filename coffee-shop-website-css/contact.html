<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — Brew & Bean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>Contact Us</h1>

        <div class="contact-info">
            <ul>
                <li>Phone: <a href="tel:+15550123456">(555) 012-3456</a></li>
                <li>Address: 42 Roast Lane, Portland, OR 97201</li>
                <li>Hours: Mon–Fri 7am–7pm &nbsp;|&nbsp; Sat–Sun 8am–6pm</li>
            </ul>
        </div>

        <div class="hero">
            <img
                src="https://images.pexels.com/photos/683039/pexels-photo-683039.jpeg"
                alt="Cosy coffee shop interior with wooden tables — Photo by Pixabay on Pexels"
            >
        </div>

        <div class="contact-form">
            <h2>Send us a message</h2>
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
